{% extends "!layout.html" %}

{% block extrabody %}
{{ super() }}
{% if supported_languages %}
<div class="language-selector">
    <select onchange="window.location.href=this.value;">
        {% set lang_map = {'en': ''} %}
        {% for lang_code, lang_name in supported_languages.items() %}
            <option value="{{ 
                pathto('', 1) + ('../' if language != 'en' else '') + lang_map.get(lang_code, lang_code) + 
                ('/' if lang_code != 'en' else '') + 
                (pagename.replace('_ZH', '') + '.html' if language == 'zh-CN' and pagename.endswith('_ZH') else 
                (pagename + '_ZH.html' if lang_code == 'zh-CN' and not pagename.endswith('_ZH') else pagename + '.html'))
            }}" 
                    {% if language == lang_map.get(lang_code, lang_code) %}selected{% endif %}>
                {{ lang_name }}
            </option>
        {% endfor %}
    </select>
</div>
{% endif %}
{% endblock %}
